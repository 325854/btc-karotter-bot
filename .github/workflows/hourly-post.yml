name: Post BTC to Karotter

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'
      timezone: "Asia/Tokyo"

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TZ: Asia/Tokyo
    steps:
      - name: Debug trigger
        run: |
          echo "event=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          date
          date -u
